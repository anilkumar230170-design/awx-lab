---
- name: Linux Health Check
  hosts: all
  gather_facts: yes

  tasks:

    - name: Hostname
      command: hostname
      register: hostname

    - name: Uptime
      command: uptime
      register: uptime

    - name: Disk Usage
      command: df -h
      register: disk

    - name: Memory Usage
      command: free -m
      register: memory

    - name: CPU Load
      command: top -bn1 | head -5
      register: cpu

    - name: Display Results
      debug:
        msg:
          - "{{ hostname.stdout }}"
          - "{{ uptime.stdout }}"
          - "{{ disk.stdout_lines }}"
          - "{{ memory.stdout_lines }}"
