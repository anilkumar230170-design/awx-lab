---
- name: Linux Patching Demo
  hosts: all
  gather_facts: yes

  tasks:

    - name: Display hostname
      debug:
        msg: "Hostname: {{ ansible_hostname }}"

    - name: Display operating system
      debug:
        msg: "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Display kernel version
      debug:
        msg: "Kernel: {{ ansible_kernel }}"

    - name: Display CPU count
      debug:
        msg: "vCPU: {{ ansible_processor_vcpus }}"

    - name: Display memory
      debug:
        msg: "Memory MB: {{ ansible_memtotal_mb }}"

    - name: Simulate patch installation
      debug:
        msg: "Patching completed successfully"

    - name: Compliance status
      debug:
        msg: "Server is compliant"
